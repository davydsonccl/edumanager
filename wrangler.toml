# Cloudflare Pages / Workers Configuration
name = "edumanager"
main = "src/worker.ts"
compatibility_date = "2024-04-01"

[assets]
directory = "./dist"
binding = "ASSETS"

[[d1_databases]]
binding = "D1"
database_name = "edumanager_db"
database_id = "ID_DO_SEU_BANCO_D1" # Substitua pelo ID real do seu banco D1
